name: BooksAppV2
options:
  bundleIdPrefix: in.josepht
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

packages:
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: 1.16.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  BooksAppV2:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: BooksAppV2/Assets.xcassets
    resources:
      - path: Resources
    dependencies:
      - package: onnxruntime
        product: onnxruntime
    info:
      path: BooksAppV2/Info.plist
      properties:
        CFBundleDisplayName: J7seven
        CFBundleName: BooksAppV2
        CFBundleIdentifier: in.josepht.booksappv2
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: "EPUB Document"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.idpf.epub-container
            UTTypeDescription: "EPUB Document"
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - epub
              public.mime-type:
                - application/epub+zip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.josepht.booksappv2
        PRODUCT_NAME: BooksAppV2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_FILE: BooksAppV2/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  BooksAppV2Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: BooksAppV2
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES


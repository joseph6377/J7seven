name: BooksAppV2
options:
  bundleIdPrefix: in.josepht
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

packages:
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: 1.16.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  BooksAppV2:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: BooksAppV2/Assets.xcassets
    resources:
      - path: Resources
    dependencies:
      - package: onnxruntime
        product: onnxruntime
    info:
      path: BooksAppV2/Info.plist
      properties:
        CFBundleDisplayName: "J7 Listen"
        CFBundleName: BooksAppV2
        CFBundleIdentifier: in.josepht.booksappv2
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: "EPUB Document"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: "PDF Document"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.idpf.epub-container
            UTTypeDescription: "EPUB Document"
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - epub
              public.mime-type:
                - application/epub+zip
    postBuildScripts:
      - name: Fix ONNX Runtime MinimumOSVersion
        script: |
          set -e
          FRAMEWORKS_PATH="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          PLIST="${FRAMEWORKS_PATH}/onnxruntime.framework/Info.plist"
          if [ -f "$PLIST" ]; then
              echo "Patching MinimumOSVersion in onnxruntime.framework"
              /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$PLIST" || \
              /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion ${IPHONEOS_DEPLOYMENT_TARGET}" "$PLIST"
              
              # Re-sign the framework to prevent 'integrity could not be verified' / codesign errors
              SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-}"
              if [ -z "$SIGN_IDENTITY" ]; then
                  # Fallback to ad-hoc signing if no identity is expanded (e.g. Simulator builds)
                  SIGN_IDENTITY="-"
              fi
              echo "Resigning onnxruntime.framework with identity: ${SIGN_IDENTITY}"
              /usr/bin/codesign --force --sign "${SIGN_IDENTITY}" --timestamp=none --preserve-metadata=identifier,entitlements,flags "${FRAMEWORKS_PATH}/onnxruntime.framework"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.josepht.booksappv2
        PRODUCT_NAME: BooksAppV2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 1.0
        INFOPLIST_FILE: BooksAppV2/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "537JMFBG2B"

  BooksAppV2Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: BooksAppV2
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES


name: BooksAppV2
options:
  bundleIdPrefix: in.josepht
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

packages:
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: 1.16.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0
  SwiftReadability:
    url: https://github.com/lake-of-fire/swift-readability.git
    branch: main

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  BooksAppV2:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "Services/Web/ShareExtension/**"
      - path: BooksAppV2/Assets.xcassets
    resources:
      - path: Resources
    dependencies:
      - package: onnxruntime
        product: onnxruntime
      - package: SwiftSoup
        product: SwiftSoup
      - package: SwiftReadability
        product: SwiftReadability
      - target: J7ShareExtension
    entitlements:
      path: BooksAppV2/BooksAppV2.entitlements
      properties:
        com.apple.security.application-groups:
          - group.in.josepht.booksappv2
    info:
      path: BooksAppV2/Info.plist
      properties:
        CFBundleDisplayName: "LysnBox"
        CFBundleName: BooksAppV2
        CFBundleIdentifier: in.josepht.booksappv2
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: "in.josepht.booksappv2"
            CFBundleURLSchemes:
              - lysnbox
              - j7
              - booksapp
        CFBundleDocumentTypes:
          - CFBundleTypeName: "EPUB Document"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: "PDF Document"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.idpf.epub-container
            UTTypeDescription: "EPUB Document"
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - epub
              public.mime-type:
                - application/epub+zip
    postBuildScripts:
      - name: Fix ONNX Runtime MinimumOSVersion
        script: |
          set -e
          FRAMEWORKS_PATH="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          PLIST="${FRAMEWORKS_PATH}/onnxruntime.framework/Info.plist"
          if [ -f "$PLIST" ]; then
              echo "Patching MinimumOSVersion in onnxruntime.framework"
              /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$PLIST" || \
              /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion ${IPHONEOS_DEPLOYMENT_TARGET}" "$PLIST"
              
              # Re-sign the framework to prevent 'integrity could not be verified' / codesign errors
              SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-}"
              if [ -z "$SIGN_IDENTITY" ]; then
                  # Fallback to ad-hoc signing if no identity is expanded (e.g. Simulator builds)
                  SIGN_IDENTITY="-"
              fi
              echo "Resigning onnxruntime.framework with identity: ${SIGN_IDENTITY}"
              /usr/bin/codesign --force --sign "${SIGN_IDENTITY}" --timestamp=none --preserve-metadata=identifier,entitlements,flags "${FRAMEWORKS_PATH}/onnxruntime.framework"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.josepht.booksappv2
        PRODUCT_NAME: BooksAppV2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.0
        INFOPLIST_FILE: BooksAppV2/Info.plist
        CODE_SIGN_STYLE: Automatic
        # DEVELOPMENT_TEAM: "537JMFBG2B"
        
  J7ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Services/Web/ShareExtension
      - path: Sources/Services/Web/SharedContainer.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.josepht.booksappv2.ShareExtension
        PRODUCT_NAME: J7ShareExtension
        INFOPLIST_FILE: Sources/Services/Web/ShareExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        # DEVELOPMENT_TEAM: "537JMFBG2B"
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.0
    entitlements:
      path: Sources/Services/Web/ShareExtension/J7ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.in.josepht.booksappv2

  BooksAppV2Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: BooksAppV2
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  BooksAppV2UITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: BooksAppV2
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BooksAppV2:
    build:
      targets:
        BooksAppV2: all
        BooksAppV2Tests: [test]
        BooksAppV2UITests: [test]
        J7ShareExtension: all
    test:
      targets:
        - BooksAppV2Tests
        - BooksAppV2UITests

